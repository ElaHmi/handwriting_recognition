name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Sync to Hugging Face
        uses: huggingface/hub-sync@v1
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: ElaHmi/handwriting_recognition
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
