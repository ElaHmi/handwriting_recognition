name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  # This allows you to run the sync manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # This command uses the 2026 'hf' tool to sync everything including binary models
        run: |
          hf upload ElaHmi/handwriting_recognition . . --repo-type space --token $HF_TOKEN
